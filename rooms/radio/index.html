<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />

  <link rel="stylesheet" href="/assets/style.css">
</head>

<body>
  <main>
    <pre>radio</pre>

    <p class="small">
      SPINFM live signal.
    </p>

    <p class="small">
      a moving pulse.<br>
      voices drift in and out.
    </p>

    <p class="small">
      some tracks are familiar.<br>
      most are already elsewhere.
    </p>

    <p class="small">
      <a href="https://playspinfm.com/">listen</a>
    </p>

    <p>
<a href="/shelf/links/">elsewhere</a>
</p>

<p class="small">
  <a href="/rooms/">← rooms</a>
  <span class="small"> / </span>
  <a href="/">home</a>
</p>
  </main>

 <pre id="log"></pre>

<script>
fetch("https://voidtrace.quietvoid.workers.dev", {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({
    room: "radio"
  })
}).catch(() => {});

fetch("https://voidtrace.quietvoid.workers.dev/?room=radio")
  .then(res => res.json())
  .then(data => {
    const el = document.getElementById("log");
    el.innerHTML = data
  .map((item, i) => {
    const t = new Date(item.created_at + "Z")
      .toISOString()
      .slice(11, 19);

    return `<div style="opacity:${1 - i * 0.15}">${t}</div>`;
  })
  .join("");
  })
  .catch(() => {});
</script>
</body>
</html>
