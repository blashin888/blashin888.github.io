(() => {
  const shouldAppear = Math.random() < 0.45;
  if (!shouldAppear) return;

  const marks = ". . .";
  const marks = variants[Math.floor(Math.random() * variants.length)];

  const el = document.createElement("div");
  el.className = "presence small";
  el.textContent = marks;

  const positions = [
    { top: "38vh", left: "68vw" },
    { top: "46vh", left: "74vw" },
    { top: "54vh", left: "66vw" },
    { top: "62vh", left: "72vw" },
    { top: "68vh", left: "18vw" }
  ];
  const pos = positions[Math.floor(Math.random() * positions.length)];

  el.style.top = pos.top;
  el.style.left = pos.left;
  el.style.opacity = "0";
  el.style.color = "inherit";
  el.style.letterSpacing = "0.2em";

  document.body.appendChild(el);

  const baseOpacity = 0.18 + Math.random() * 0.16;
  const visibleFor = 2200 + Math.floor(Math.random() * 2200);
  const fadeDelay = 400 + Math.floor(Math.random() * 900);

  requestAnimationFrame(() => {
    el.style.opacity = String(baseOpacity);
  });

  setTimeout(() => {
    el.style.opacity = "0";
  }, fadeDelay + visibleFor);

  setTimeout(() => {
    el.remove();
  }, fadeDelay + visibleFor + 2400);
})();
</script>
