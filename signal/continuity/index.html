<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  background: #000;
  color: rgba(255,255,255,.7);
  overflow: hidden;
  font-family: system-ui, sans-serif;
}

  
.continuity-page {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.continuity-observation {
  position: relative;
  width: min(88vw, 720px);
  aspect-ratio: 4 / 5;
}

.layer {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.real {
  animation: realFade 14s infinite ease-in-out;
}

.generated {
  animation: generatedFade 14s infinite ease-in-out;
}

@keyframes realFade {
  0%,48% { opacity:1; }
  52%,96% { opacity:0; }
  100% { opacity:1; }
}

@keyframes generatedFade {
  0%,48% { opacity:0; }
  52%,96% { opacity:1; }
  100% { opacity:0; }
}

.continuity-line {
  margin-top: 2rem;
  opacity: .28;
}
</style>
</head>

<body>
<div class="continuity-page">

<div class="continuity-observation">
<img src="/assets/img/signal/real-01.jpg" class="layer real">
<img src="/assets/img/signal/generated-01.jpg" class="layer generated">
</div>

<p class="continuity-line">
observation before certainty.
</p>

</div>
</body>
</html>
