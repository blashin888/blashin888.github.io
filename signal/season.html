<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>season gauge | signal</title>

  <style>
    body {
      margin: 0;
      background: #050505;
      color: rgba(255, 255, 255, 0.58);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      letter-spacing: 0.04em;
    }

    main {
      min-height: 100vh;
      padding: 14vh 6vw 12vh;
      box-sizing: border-box;
    }

   .note {
  width: 100%;
  max-width: 860px;
  margin: 0 auto 12vh;
  font-size: 0.95rem;
  line-height: 1.9;
  opacity: 0.72;
}

    .season-frame {
      width: 100%;
      max-width: 860px;
      height: auto;
      display: block;
      margin: 0 auto;
      opacity: 0.88;
    }

   .caption {
  width: 100%;
  max-width: 860px;
  margin: 2rem auto 0;
  font-size: 0.78rem;
  line-height: 1.8;
  opacity: 0.42;
}

    .back {
  width: 100%;
  max-width: 860px;
  display: block;
  margin: 16vh auto 0;
  font-size: 0.78rem;
  color: rgba(255, 255, 255, 0.42);
  text-decoration: none;
}

    .back:hover {
      color: rgba(255, 255, 255, 0.7);
    }
  </style>
</head>

<body>
  <main>
    <div class="note">
      <div>season gauge.</div>
      <div>same place, another reading.</div>
    </div>
<img
      class="season-frame"
      src="/assets/img/signal/season/season-2026-06-08-13.jpg"
      alt="season gauge from the veranda"
    />

    <div class="caption">
  <div>2026-06-08</div>
  <br>  <div>13:21</div>
  <div>mountain in visible</div>
  <div>rain steady</div>
  <div>laundry postponed</div>
</div>

    
    <img
      class="season-frame"
      src="/assets/img/signal/season/season-2026-06-08.jpg"
      alt="season gauge from the veranda"
    />

    <div class="caption">
  <div>2026-06-08</div>
  <br><div>06:48</div>
  <div>mountain visible</div>
  <div>rain light</div>
  <div>laundry waiting</div>
</div>

    <a class="back" href="/signal/">← signal</a>
  </main>
</body>
</html>
