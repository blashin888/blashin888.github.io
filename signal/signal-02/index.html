<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>signal 02</title>
  <style>
    :root {
      --bg: #f7f5ef;
      --text: #1f1f1f;
      --muted: #8a8377;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    main {
      padding: 2rem;
      text-align: center;
    }

    p {
      margin: 0;
      font-size: clamp(1.1rem, 3vw, 1.6rem);
      line-height: 1.7;
      letter-spacing: 0.02em;
    }

    .mark {
      margin-top: 2.5rem;
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.12em;
    }
  </style>
</head>
<body>
  <main>
    <p>still here. nothing to prove.</p>
    <div class="mark">signal 02</div>
  </main>
</body>
</html>
